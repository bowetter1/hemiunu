<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemiunu's Infinite Pyramid</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Hemiunu</h1>
            <div id="hud">
                <span>Blocks: <span id="block-count">0</span></span> | 
                <span>Stone: <span id="stone-count">0</span></span> | 
                <span>Players: <span id="player-count">0</span></span> | 
                <span>Next milestone: <span id="milestone-progress">0/100</span></span>
            </div>
        </header>

        <main>
            <div id="milestone-notification" aria-live="polite"></div>
            <div id="error-notification" role="alert" aria-live="assertive"></div>
            <canvas id="game-canvas"></canvas>
            
            <!-- Audio Placeholders -->
            <audio id="audio-bgm" loop preload="auto" style="display: none;"></audio>
            <audio id="audio-place" preload="auto" style="display: none;"></audio>
            <audio id="audio-mine" preload="auto" style="display: none;"></audio>
        </main>

        <aside id="chat-panel" aria-label="Chat">
            <div class="panel-header">
                <h2 class="panel-title">Chat</h2>
                <button id="chat-toggle" type="button" aria-expanded="true" aria-controls="chat-body" title="Toggle chat"><<</button>
            </div>
            <div id="chat-body" class="chat-body">
                <ol id="chat-messages" aria-live="polite" aria-relevant="additions"></ol>
                <form id="chat-form" autocomplete="off">
                    <input id="chat-input" type="text" maxlength="200" placeholder="Skriv ett meddelande..." aria-label="Chat message">
                    <button id="chat-send" type="submit">Skicka</button>
                </form>
            </div>
        </aside>

        <aside id="leaderboard-panel" aria-label="Leaderboard">
            <div class="panel-header">
                <h2 class="panel-title">Leaderboard</h2>
                <span class="panel-subtitle">Top 10</span>
            </div>
            <ol id="leaderboard-list" aria-live="polite"></ol>
        </aside>

        <aside id="control-panel" aria-label="Controls">
            <button id="btn-mine" title="Click to mine 1 stone">⛏️ Mine Stone</button>
            <button id="btn-place" title="Click to place a block (Cost: 1 Stone)">🧱 Place Block</button>
            <div id="place-warning" aria-live="polite"></div>
            <div id="status-bar">Connecting...</div>
            <button id="btn-debug-clear" style="margin-top: 20px; background: #444; color: #f66;">💣 Clear All (Debug)</button>
            <button id="btn-mute" style="margin-top: 10px;">🔊 Sound On</button>
        </aside>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
